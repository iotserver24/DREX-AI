name: DREX Build & Test

on:
  push:
    branches: [main, master, 'copilot/**']
  pull_request:
    branches: [main, master]

jobs:
  # ─── Core Engine: Build + Test ─────────────────────────────────────────────
  core-build-test:
    name: Core — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Build core
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: drex-core-dist
          path: core/dist/
          retention-days: 7

  # ─── App: Type-check + Renderer Build ─────────────────────────────────────
  app-build:
    name: App — Build
    runs-on: ubuntu-latest
    needs: core-build-test
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js (for Next.js)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download core dist
        uses: actions/download-artifact@v4
        with:
          name: drex-core-dist
          path: core/dist/

      - name: Install app dependencies
        run: bun install

      - name: TypeScript type-check
        run: bun run type-check

      - name: Build Next.js renderer
        run: bun run build:renderer
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload renderer build
        uses: actions/upload-artifact@v4
        with:
          name: drex-renderer-build
          path: app/renderer/.next/
          retention-days: 7

  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

  # ─── Screenshots (visual smoke test) ──────────────────────────────────────
  screenshot:
    name: Screenshots
    runs-on: ubuntu-latest
    needs: app-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install app dependencies
        working-directory: app
        run: bun install

      - name: Start Next.js dev server
        working-directory: app
        run: |
          bun run dev &
          sleep 8
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Take screenshots
        run: npx playwright screenshot --browser=chromium http://localhost:3000/projects --output screenshots/projects.png
        continue-on-error: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30
